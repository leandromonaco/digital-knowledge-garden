site_name: Knowledge Base
site_url: https://leandromonaco.github.io
site_description: This is a site where I document my learning journey.
site_author: Leandro Monaco

nav:
    - Home: index.md
    - Getting Started:
        - 'Development Machine Setup': 'technology/DevelopmentMachineSetup.md'
    - Development:
        - 'Angular': 'technology/Angular.md'
        - 'Playwright': 'technology/Playwright.md'
        - 'Configuration': 'technology/Configuration.md'
        - 'AWS': 'technology/AWS.md'
        - 'Docker': 'technology/Docker.md'
    - Database:
        - 'SQL Server': 'technology/SqlServer.md'
        - 'Entity Framework': 'technology/EntityFramework.md'
    - Management:
        - '1:1 Guidelines': 'management/1-on-1-guidelines.md'
        - 'OKRs': 'management/OKRs.md'
        - 'Ways of Working': 'management/ways-of-working.md'
        - 'Development Guidelines': 'management/development-guidelines.md'

repo_name: leandromonaco.github.io
repo_url: https://github.com/leandromonaco/leandromonaco.github.io
#edit_uri: ""

theme:
  name: material
  custom_dir: mkdocs-overrides
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  # Static files
  static_templates:
    - 404.html

  # Don't include MkDocs' JavaScript
  include_search_page: false
  search_index_only: true

plugins:
  - search
  - git-revision-date-localized

# Default values, taken from mkdocs_theme.yml
language: en

features:
    - content.code.annotate
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.indexes
    # - navigation.instant
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate

font:
    text: Roboto
    code: Roboto Mono
    
# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:materialx.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
