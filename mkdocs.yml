site_author: Leandro Monaco

nav:
    - Home: index
    - Learning:
        - Books: 'pages/Books'
        - Training: 'pages/Training' 
    - Tooling:
        - 'Playwright': 'pages/Playwright'
        - 'Docker': 'pages/Docker'
        - 'Git': 'pages/Git'    
        - 'Development Machine Setup': 'pages/Development Environment Setup'
    - '.NET':
        - 'Configuration': 'pages/Configuration'
    - Cloud:
        - 'AWS': 'pages/AWS'
        - 'Azure': 'pages/Azure'
    - Data:
        - 'SQL Server': 'pages/Sql Server'
        - 'Entity Framework': 'pages/EntityFramework'
    - 'Front-end':
        - 'Angular': 'pages/Angular'
    - Management:
        - '1:1 Guidelines': 'pages/1on1s'
        - 'Ways of Working': 'pages/Ways of Working'
        - 'Software Development Strategy': 'pages/Software Development Strategy'
    - 'Goals': 
        - 'OKRs': 'pages/Goals'
        - 'Quality': 'pages/Quality'
        - 'Continous Improvement': 'pages/Continous Improvement'
        - 'Knowledge Sharing': 'pages/Knowledge Sharing'


repo_name: leandromonaco.github.io
repo_url: https://github.com/leandromonaco/leandromonaco.github.io
edit_uri: "edit/main/docs"

theme:
  name: material
  custom_dir: mkdocs-overrides
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  # Static files
  static_templates:
    - 404.html

  # Don't include MkDocs' JavaScript
  include_search_page: false
  search_index_only: true

plugins:
  - search
  - git-revision-date-localized

# Default values, taken from mkdocs_theme.yml
language: en

features:
    - content.code.annotate
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.indexes
    # - navigation.instant
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate

font:
    text: Roboto
    code: Roboto Mono
    
# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:materialx.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
